<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Редактирай лекар</title>
</head>
<body>

<nav th:replace="~{fragments :: navbar}"></nav>

<h1>Редактирай лекар</h1>

<form th:action="@{/doctors/edit/{id}(id=${doctor.id})}" th:object="${doctor}" method="post">
    <div>
        <label>Идентификационен номер:</label>
        <input type="text" th:field="*{identificationNumber}"/>
    </div>
    <div>
        <label>Име:</label>
        <input type="text" th:field="*{firstName}"/>
    </div>
    <div>
        <label>Фамилия:</label>
        <input type="text" th:field="*{lastName}"/>
    </div>
    <button type="submit">Запази</button>
    <a th:href="@{/doctors}">Назад</a>
</form>

</body>
</html>
