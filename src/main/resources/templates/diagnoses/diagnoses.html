<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Диагнози</title>
</head>
<body>

<nav th:replace="~{fragments :: navbar}"></nav>

<h1>Диагнози</h1>

<a th:href="@{/diagnoses/create}">Добави диагноза</a>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Име</th>
        <th>Описание</th>
        <th>Действия</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="diagnosis : ${diagnoses}">
        <td th:text="${diagnosis.id}"></td>
        <td th:text="${diagnosis.name}"></td>
        <td th:text="${diagnosis.description}"></td>
        <td>
            <a th:href="@{/diagnoses/edit/{id}(id=${diagnosis.id})}">Редактирай</a>
            <a th:href="@{/diagnoses/delete/{id}(id=${diagnosis.id})}">Изтрий</a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
