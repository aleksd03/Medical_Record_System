<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Добави болничен лист</title>
</head>
<body>

<nav th:replace="~{fragments :: navbar}"></nav>

<h1>Добави болничен лист</h1>

<form th:action="@{/sick-leaves/create}" th:object="${sickLeave}" method="post">
    <div>
        <label>Начална дата:</label>
        <input type="date" th:field="*{startDate}"/>
    </div>
    <div>
        <label>Брой дни:</label>
        <input type="number" th:field="*{numberOfDays}"/>
    </div>
    <div>
        <label>Преглед:</label>
        <select th:field="*{appointmentId}">
            <option th:each="appointment : ${appointments}"
                    th:value="${appointment.id}"
                    th:text="${appointment.id + ' - ' + appointment.date}">
            </option>
        </select>
    </div>
    <button type="submit">Запази</button>
    <a th:href="@{/sick-leaves}">Назад</a>
</form>

</body>
</html>
